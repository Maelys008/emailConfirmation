<!doctype html>
<html>
  <head>
    <title>Alatinsa - Authentification</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        text-align: center;
        padding-top: 50px;
        background: #faf7f2;
        color: #333;
      }
      .card {
        background: white;
        padding: 40px;
        border-radius: 12px;
        display: inline-block;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        max-width: 400px;
      }
      h1 {
        color: #8d5b23;
        font-family: "serif";
      }
      .btn {
        background: #8d5b23;
        color: white;
        padding: 12px 25px;
        border-radius: 4px;
        text-decoration: none;
        display: inline-block;
        margin-top: 20px;
        border: none;
        cursor: pointer;
      }
      input {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div id="content">
        <h1>Alatinsa</h1>
        <p>Traitement en cours...</p>
      </div>
    </div>

    <script>
      function getParams() {
        // On récupère les paramètres après le ? (search) et après le # (hash)
        const urlParams = new URLSearchParams(window.location.search);
        const hashParams = new URLSearchParams(
          window.location.hash.substring(1),
        );

        return {
          code: urlParams.get("code") || hashParams.get("code"),
          type: urlParams.get("type") || hashParams.get("type"),
        };
      }

      const params = getParams();
      const content = document.getElementById("content");

      // LOGIQUE : Si on a un "code" ou si le type est "recovery", on affiche le reset
      if (params.code || params.type === "recovery") {
        content.innerHTML = `
            <h1>Nouveau mot de passe</h1>
            <p>Un code de sécurité a été détecté. Tu peux maintenant choisir un nouveau mot de passe pour Alatinsa.</p>
            <div style="margin-top: 20px;">
                <input type="password" id="new_password" placeholder="Minimum 6 caractères" 
                       style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 15px; box-sizing: border-box;">
                <button class="btn" onclick="updatePassword()">Mettre à jour le mot de passe</button>
            </div>
        `;
      } else {
        content.innerHTML = `
            <h1>Compte Vérifié !</h1>
            <p>Merci Maëlys, ton compte est désormais actif. Tu peux retourner dans l'application.</p>
        `;
       } 
      

      function updatePassword() {
        const pass = document.getElementById("new_password").value;
        if (pass.length < 6) {
          alert("Le mot de passe doit faire au moins 6 caractères.");
          return;
        }
        // Simulation de succès pour ton test local
        alert(
          "Succès ! Ton mot de passe a été modifié.\nRedirige-toi maintenant vers l'application Alatinsa pour te connecter.",
        );
      }
    </script>
  </body>
</html>
